<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoVentas | Tecnología Premium</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">
            <img src="logo.png" class="logo-img"> GEO<span>VENTAS</span>
        </div>
        <ul class="nav-links">
            <li><a href="#inicio">Inicio</a></li>
            <li><a href="#productos">Catálogo</a></li>
        </ul>
    </nav>

    <header id="inicio" class="hero">
        <h1>GeoVentas</h1>
        <p>Tecnología que eleva tu estilo</p>
        <a href="#productos" class="btn-main">Ver Catálogo</a>
    </header>

    <section id="productos" class="productos">
        <h2>Nuestros Productos</h2>
        <div class="grid-productos">
            <div class="card">
                <img src="producto1.jpg" alt="Producto">
                <h3>Audífonos Pro</h3>
                <p>$24.990</p>
            </div>
            <div class="card">
                <img src="producto2.jpg" alt="Producto">
                <h3>Cargador Carga Rápida</h3>
                <p>$12.990</p>
            </div>
        </div>
    </section>

</body>
</html>
